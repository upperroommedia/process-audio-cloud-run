# cloudbuild.yaml
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
        'build',
        '--build-arg',
        'CACHEBUST=${COMMIT_SHA}', # force latest yt-dlp layer
        '-t',
        '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}',
        '.',
      ]

  # Step 2: Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}']

  # Step 3: Deploy the dedicated PO-token provider service and persist its URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy "${_POT_PROVIDER_SERVICE_NAME}" \
          --project "${_PROJECT_ID}" \
          --image "${_POT_PROVIDER_IMAGE}" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --min-instances "${_POT_PROVIDER_MIN_INSTANCES}" \
          --max-instances "${_POT_PROVIDER_MAX_INSTANCES}" \
          --cpu "${_POT_PROVIDER_CPU}" \
          --memory "${_POT_PROVIDER_MEMORY}" \
          --concurrency "${_POT_PROVIDER_CONCURRENCY}" \
          --timeout "${_POT_PROVIDER_TIMEOUT}"

        gcloud run services describe "${_POT_PROVIDER_SERVICE_NAME}" \
          --project "${_PROJECT_ID}" \
          --region "${_REGION}" \
          --format='value(status.url)' > /workspace/pot_provider_url.txt

        test -s /workspace/pot_provider_url.txt

  # Step 4: Deploy to Cloud Run (private service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -ceu
      - |
        POT_PROVIDER_URL="$$(cat /workspace/pot_provider_url.txt)"

        gcloud run deploy "${_SERVICE_NAME}" \
          --project "${_PROJECT_ID}" \
          --image "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}" \
          --region "${_REGION}" \
          --platform managed \
          --cpu "${_CPU}" \
          --memory "${_MEMORY}" \
          --cpu-boost \
          --cpu-throttling \
          --concurrency "${_CONCURRENCY}" \
          --min-instances "${_MIN_INSTANCES}" \
          --max-instances "${_MAX_INSTANCES}" \
          --timeout "${_TIMEOUT}" \
          --update-secrets "RUNTIME_ALERT_RECIPIENTS=${_RUNTIME_ALERT_RECIPIENTS_SECRET}:latest" \
          --update-env-vars "NODE_ENV=production,FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET},FIREBASE_DATABASE_URL=${_FIREBASE_DATABASE_URL},YTDLP_POT_PROVIDER_BASE_URL=$$POT_PROVIDER_URL,YTDLP_USE_COOKIES_FOR_PUBLIC_VIDEOS=${_YTDLP_USE_COOKIES_FOR_PUBLIC_VIDEOS},YTDLP_CONCURRENT_FRAGMENTS=${_YTDLP_CONCURRENT_FRAGMENTS},YOUTUBE_RETRY_DELAY_MS=${_YOUTUBE_RETRY_DELAY_MS},YTDLP_COOKIE_HEALTHCHECK_ENABLED=${_YTDLP_COOKIE_HEALTHCHECK_ENABLED},YTDLP_POT_DISABLE_INNERTUBE=${_YTDLP_POT_DISABLE_INNERTUBE}"

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}'

substitutions:
  _PROJECT_ID: 'urm-app'
  _REGION: 'us-central1'
  _AR_REPO: 'process-audio-repo'
  _IMAGE_NAME: 'process-audio'
  _SERVICE_NAME: 'process-audio'
  _POT_PROVIDER_SERVICE_NAME: 'ytdlp-pot-provider'
  _POT_PROVIDER_IMAGE: 'docker.io/brainicism/bgutil-ytdlp-pot-provider'
  _POT_PROVIDER_CPU: '1'
  _POT_PROVIDER_MEMORY: '512Mi'
  _POT_PROVIDER_CONCURRENCY: '1'
  _POT_PROVIDER_MIN_INSTANCES: '0'
  _POT_PROVIDER_MAX_INSTANCES: '3'
  _POT_PROVIDER_TIMEOUT: '300'
  _FIREBASE_PROJECT_ID: 'urm-app'
  _FIREBASE_STORAGE_BUCKET: 'urm-app.appspot.com'
  _FIREBASE_DATABASE_URL: 'https://urm-app-default-rtdb.firebaseio.com/'
  _RUNTIME_ALERT_RECIPIENTS_SECRET: 'RUNTIME_ALERT_RECIPIENTS'
  _CPU: '2'
  _MEMORY: '4Gi'
  _CONCURRENCY: '1'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _TIMEOUT: '3600'
  _YTDLP_USE_COOKIES_FOR_PUBLIC_VIDEOS: 'false'
  _YTDLP_CONCURRENT_FRAGMENTS: '1'
  _YOUTUBE_RETRY_DELAY_MS: '1500'
  _YTDLP_COOKIE_HEALTHCHECK_ENABLED: 'true'
  _YTDLP_POT_DISABLE_INNERTUBE: 'false'
