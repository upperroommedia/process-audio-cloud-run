name: Build and Deploy Process Audio (Staging)

env:
  PYTHONWARNINGS: 'ignore' # suppress warnings from app engine libraries

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: process-audio-staging-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up GCP credentials
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - name: Trigger Cloud Build
        run: |
          gcloud beta builds submit \
            --project=urm-app-staging \
            --config cloudbuild.yaml \
            --substitutions=TRIGGER_NAME="github-actions",BRANCH_NAME="${{ github.ref_name }}",COMMIT_SHA="${{ github.sha }}",REPO_NAME="${{ github.repository }}",REPO_FULL_NAME="${{ github.repository }}",TAG_NAME="${{ github.ref_name }}",REF_NAME="${{ github.ref_name }}",_PROJECT_ID="urm-app-staging",_REGION="us-central1",_AR_REPO="process-audio-repo",_IMAGE_NAME="process-audio",_SERVICE_NAME="process-audio-staging",_FIREBASE_PROJECT_ID="urm-app-staging",_FIREBASE_STORAGE_BUCKET="urm-app-staging.firebasestorage.app",_FIREBASE_DATABASE_URL="https://urm-app-staging-default-rtdb.firebaseio.com/",_CPU="2",_MEMORY="4Gi",_CONCURRENCY="1",_MIN_INSTANCES="0",_MAX_INSTANCES="10",_TIMEOUT="3600"

      - name: Sync COOKIES env from production to staging
        run: |
          COOKIES_VALUE="$(gcloud run services describe process-audio \
            --project=urm-app \
            --region=us-central1 \
            --format=json | jq -r '.spec.template.spec.containers[0].env[] | select(.name == "COOKIES") | .value')"

          if [ -z "${COOKIES_VALUE}" ] || [ "${COOKIES_VALUE}" = "null" ]; then
            echo "COOKIES env not found on production service" >&2
            exit 1
          fi

          echo "::add-mask::${COOKIES_VALUE}"

          gcloud run services update process-audio-staging \
            --project=urm-app-staging \
            --region=us-central1 \
            --update-env-vars="COOKIES=${COOKIES_VALUE}"
