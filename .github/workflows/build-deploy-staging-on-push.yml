name: Build and Deploy Process Audio (Staging)

env:
  PYTHONWARNINGS: 'ignore' # suppress warnings from app engine libraries

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: process-audio-staging-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: urm-app-staging
      REGION: us-central1
      AR_REPO: process-audio-repo
      IMAGE_NAME: process-audio
      SERVICE_NAME: process-audio-staging
      FIREBASE_DATABASE_URL: https://urm-app-staging-default-rtdb.firebaseio.com/

    steps:
      - uses: actions/checkout@v4

      - name: Set up GCP credentials
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push container image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Deploy Cloud Run service (staging)
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --platform=managed \
            --cpu=4 \
            --memory=4Gi \
            --timeout=1800 \
            --port=8080 \
            --set-env-vars="NODE_ENV=production,FIREBASE_PROJECT_ID=urm-app-staging,FIREBASE_STORAGE_BUCKET=urm-app-staging.firebasestorage.app,FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}" \
            --min-instances=1 \
            --max-instances=10
